<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>id选择器</title>
  <!-- id选择器 选择一个元素 -->
  <!-- id选择器的语法：#id名 -->
  <!-- id选择器的作用：将id名添加到元素上，实现对元素的样式控制,只能选择一个id -->
  <style>
    #red {
      color:red;
    }
  </style>
</head>
<body>
  <div id="red">111</div>
  <div>222</div>
  <div>333</div>
</body>
</html>
