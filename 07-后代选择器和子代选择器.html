<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后代选择器和子代选择器</title>
  <style>
    /* 后代选择器 */
    .footer a {
      color: rgb(114, 108, 108);
      font-size: 20px;
    }
    /* ul li a { 
      color: rgb(114, 108, 108);
      font-size: 20px;
    }
      */
      .nav li a {
        color: rgb(136, 74, 74);
        font-size: 20px;
      }
      /* 子代选择器 */
      div > span {
        color: rgb(93, 19, 162)
      }
  </style>
</head>
<body>
  <!-- 后代选择器 -->
   <ul class="nav">
    <li><a href="#">首页</a></li>
    <li><a href="#">产品介绍</a></li>
    <li><a href="#">合作模式</a></li>
   </ul>
   <div class="footer">
    <a href="#">关于我们</a>
    <a href="#">联系我们</a>
    <a href="#">隐私政策</a>

   </div>
   <!-- 子代选择器 -->
   <div>
    <span>我是姥姥</span>
    <p>
      <span>我是女儿</span>
    </p>
   </div>
</body>
</html>
