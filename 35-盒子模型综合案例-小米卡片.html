<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>综合案例-小米卡片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #ccc;
    }
    .cart {
      width: 234px;
      height: 300px;
      background-color: #fff;
      margin: 100px auto;
      text-align: center;
      /* 过渡写到盒子身上，谁要过渡给谁加 */
      transition: all .3s;
    }
    .cart:hover {
      box-shadow: rgba(0, 0, 0, 0.1) 0px 15px 30px ;
    }
    .cart img {
      width: 160px;
      height: 160px;
      margin-top: 20px;
    }
    .cart .title {
      font-size: 14px;
      font-weight: 400;
      color: #333;
      margin-top: 18px;
    }
    /* 单行文本溢出会有省略号 */
    .cart .desc {
      font-size: 12px;
      color: #b0b0b0;
      /* 超出部分隐藏 */
      overflow: hidden;
      /* 文字超出部分显示省略号 */   
      text-overflow: ellipsis;
      /* 不换行 强制文字显示在一行内 */
      white-space: nowrap;
      padding: 0 10px;
    }
    .cart .price {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      color: #b0b0b0;
    }
    .cart .price span {
      font-size: 14px;
      font-weight: 400;
      color: #ff6700;
    }
  </style>
</head>
<body>
  <div class="cart">
    <img src="./img/mi.jpg" alt="">
    <h3 class="title">xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
    <p class="price">
      <span>659元</span>
      <del>699元</del>
    </p>
  </div>
   <div class="cart">
    <img src="./img/mi.jpg" alt="">
    <h3 class="title">xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
    <p class="price">
      <span>659元</span>
      <del>699元</del>
    </p>
  </div>
   <div class="cart">
    <img src="./img/mi.jpg" alt="">
    <h3 class="title">xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
    <p class="price">
      <span>659元</span>
      <del>699元</del>
    </p>
  </div>
  
</body>
</html>
