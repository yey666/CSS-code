<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面基本布局</title>
  <style>
    *{
      margin: 0;
      /* 清除默认的外边距 */
      padding: 0;
      /* 清除默认的内边距 */
    }
    .header {
      height :80px;
      background-color: #ccc;
    }
    .nav {
      width: 300px;
      height: 50px;
      background-color: #a3a0a0;
    }
    .main {
      width: 300px;
      height: 300px;
      background-color: #dbd82d;
    }
    .footer {
      width: 1000px;
      height: 50px;
      background-color: #918d8d;
    }
     /* 让块级元素居中 */
    .center {
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- 头部内容 -->
   <div class="header"></div>
   <!-- 导航栏内容 -->
   <div class="nav center"></div>
   <!-- 字体内容 -->
    <div class="main center"></div>
   <!-- 页脚内容 -->
   <div class="footer"></div>
</body>
</html>
