<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景渐变</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    .box {
      width: 249px;
      height: 100px;
      /* background: linear-gradient(to right, #8fbcf1, #f1f1f1); */
      /* deg 角度 90deg 就是90° */
      /* background: linear-gradient(90deg, #f1f1f1, #8fbcf1); */
      /* 位置 是色标的位置 */
      background: linear-gradient(90deg, rgb(250, 248, 248) 0%, #8fbcf1 50%);

    }
    .text {
      font-size: 50px;
      font-weight: bold;
      background-image: linear-gradient(97deg, #0096ff, #bb64ff 42%, orange 100%);
      /* 兼容性 */
      -webkit-background-clip: text;
      /* 背景裁剪 以文字为裁剪区域 */
      background-clip: text;
      /* 文本填充颜色 为透明 */
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div class="box"></div>
  <div class="text">我是渐变的文字，你看得出来吗</div>
  <button>点击我</button>
</body>
</html>
