<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D变化-多组变化案例</title>
  <style>
    .box {
      width: 1000px;
      height: 100px;
      border: 1px solid #000;
    }

    img {
      width: 100px;
      transition: all 2s;
    }
    .box:hover img {
      /* transform: rotate(360deg); */
      transform:  translateX(600px) rotate(360deg);
    }
  </style>
</head>
<body>
  <div class="box"><img src="./img/wj.webp" alt=""></div>
</body>
</html>
