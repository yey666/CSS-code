<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动效案例-悬停相册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a252c;
    }

    .box {
      margin: 200px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box .item {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 2px;
      cursor: pointer;
      /* 添加倒影 */
      -webkit-box-reflect: below 1px linear-gradient(transparent, #0002);  
      transition: all 0.5s ;
    }

    .box .item img {
      width: 100%;
      height: 100%;
      border-radius: 6px;
    }

    /* 核心代码 */
    /* 鼠标经过当前盒子，盒子变大 */
    .box .item:hover {
      transform: scale(1.2);
      z-index: 1;
    }

    /* 鼠标经过某个盒子，其余盒子都变形 当前盒子保持不变 */
    .box:hover .item:not(:hover) {
      transform: perspective(500px) rotateY(45deg);
      margin: 0 -20px;
    }

    /* 鼠标经过某个盒子，后面的元素，修改下变形 */
    .box .item:hover ~ .item {
      transform: perspective(500px) scale(0.9) rotateY(-45deg);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="item"><img src="./img/11111.jpg" alt=""></div>
    <div class="item"><img src="./img/22222.jpg" alt=""></div>
    <div class="item"><img src="./img/33333.jpg" alt=""></div>
    <div class="item"><img src="./img/44444.jpg" alt=""></div>
    <div class="item"><img src="./img/55555.jpg" alt=""></div>
  </div>
</body>
</html>
