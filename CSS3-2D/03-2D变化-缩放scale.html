<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D变化-缩放scale</title>
  <style>
    .box1{
      width: 200px;
      height: 200px;
      background-color: pink;
      transition: all 1s;
    }
    .box1:hover {
      /* 不影响其他元素布局 */
      transform: scale(1.5);
      /* 直接改高度的话，鼠标悬停时，box1会影响box2的布局
      width: 230px;
      height: 230px; */

    }
    .box2{
      width: 200px;
      height: 200px;
      background-color: skyblue;
    }
  </style>
</head>
<body>
  <div class="box1"></div>
  <div class="box2"></div>
</body>
</html>
