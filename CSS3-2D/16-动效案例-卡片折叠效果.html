<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片折叠效果</title>
  <style>
    /* 实现思路：1.布局使用grid分成几等份 2.鼠标经过某个子盒子，修改份数 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 去掉li的小点 */
    ul,
    ol {
      list-style: none;
    }

    .box {
      overflow: hidden;
      max-width: 1320px;
      height: 527px;
      margin: 100px auto;
    }

    .box ul {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      grid-template-rows: 527px;
      gap: 8px;
      transition: all .5s;
    }

    .box .item {
      position: relative;
      background: url(./img/pic1.jpg) no-repeat 50%/cover;
    }

    .box .item:nth-child(2) {
      background-image: url(./img/pic2.jpg) ;
    }

    .box .item:nth-child(3) {
      background-image: url(./img/pic3.jpg) ;
    }

    .box .item:nth-child(4) {
      background-image: url(./img/pic4.jpg) ;
    }

    /* 鼠标经过li，让父亲ul修改里面的份数 父亲选择器 */
    /* 当我们鼠标经过第一个li(即.item)的时候，选择父亲ul */
    .box ul:has(.item:nth-child(1):hover) {
      grid-template-columns: 2fr 1fr 1fr 1fr;
    }

    .box ul:has(.item:nth-child(2):hover) {
      grid-template-columns: 1fr 2fr 1fr 1fr;
    }

    .box ul:has(.item:nth-child(3):hover) {
      grid-template-columns: 1fr 1fr 2fr 1fr;
    }

    .box ul:has(.item:nth-child(4):hover) {
      grid-template-columns: 1fr 1fr 1fr 2fr;
    }

    .item p {
      position: absolute;
      bottom: -100px;
      left: 0;
      color: #fff;
      padding: 20px;
    }

    /* 鼠标经过.item 里面的p升上来 */
    .item:hover p {
      bottom: 0;
      transition: all .5s;
    }
    
  </style>
</head>
<body>
  <div class="box">
    <ul>
      <li class="item">
        <p>超长质保</p>
      </li>
      <li class="item">
        <p>超长质保</p>
      </li>
      <li class="item">
        <p>超长质保</p>
      </li>
      <li class="item"> 
        <p>超长质保</p>
      </li>
    </ul>
  </div>
</body>
</html>
