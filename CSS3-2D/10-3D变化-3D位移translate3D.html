<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 3D变化-两面翻转的图片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ccc;
    }

    .box {
      position: relative;
      width: 300px;
      height: 450px;
      border: 1px solid blue;
      margin: 100px auto;
      perspective: 1000px;
    }

    .box>div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: pink;
      text-align: center;
      font-size: 30px;
      color: #fff;
      line-height: 450px;
      transition: all 1.5s ;
      /* 当翻转后 前盒子因为层级高 所以背面依旧在最上层 因此要用这个方法将背面隐藏 */
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .box .front {
      z-index: 2;
    }

    .box .front h3 {
      transform: translateZ(68px);
      backface-visibility: hidden;
    }

    .box:hover .front {
      transform: rotateY(-180deg);
    }

    .box .back {
      /* padding-top: 100px; */
      background-color: skyblue;
      transform: rotateY(180deg);
    }

    .box .back p {
      /* line-height: 40px; */
      font-size: 20px;
      /* transform: translateZ(68px); */
      transform: translate3D(0, 0, 68px);
      backface-visibility: hidden;
    }

    .box:hover .back {
      transform: rotateY(0deg);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="front">
      <h3>17岁-刘德华</h3>
    </div>
    <div class="back">
      <p>唱情歌齐齐来一遍</p>
    </div>
  </div>
  
</body>
</html>
