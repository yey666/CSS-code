<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>逐帧动画仿360官网动画效果</title>
  <style>
    /* 为什么这个用盒子显示精灵图的代码，没有用overflow: hidden;但是盒子外也没有显示这张精灵图的其他部分 */
    /* 背景图天生不会溢出盒子，所以用精灵图做动画时，不需要写 overflow: hidden。 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: url(./img/bg2.png) no-repeat center/cover ;
    }

    /* 定义动画 */
    @keyframes move {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: -13700px 0px;
      }
    }
    .box {
      width: 548px;
      height: 513px;
      background-color: pink;
      margin: 200px;
      background: url(./img/step.png) no-repeat left/13700px 513px;
      /* 使用动画 */
      animation: move 1s steps(25) infinite;
      /* linear infinite alternate; */
      
    }
  </style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
