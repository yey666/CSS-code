<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圆角边框</title>
  <style>
    .radius1 {
      width: 200px;
      height: 200px;
      background-color: rgb(168, 166, 166);
      /* border-rudius为长宽的一半就是一个圆 */
      border-radius: 100px;
    }
    .radius2 {
      width: 200px;
      height: 80px;
      background-color: rgb(168, 166, 166);
      border-radius: 40px;
    }
    .radius3 {
      width: 200px;
      height: 40px;
      background-color: rgb(168, 166, 166);
      border-radius:20px;
      /* 胶囊按钮 设置圆角为 宽度或者高度较小值的一半 */
    }
    .radius4 {
      width: 40px;
      height: 200px;
      background-color: rgb(168, 166, 166);
      border-radius:20px;
      /* 胶囊按钮 设置圆角为 宽度或者高度较小值的一半 */
    }
    .jia {
      border-radius: 50%;
    }
    .radius5 {
      width: 100px;
      height: 100px;
      background-color: rgb(168, 166, 166);
      border-radius: 10px;
    }
    .radius6 {
      width: 100px;
      height: 100px;
      background-color: orange;
      /* 两个值表示：第一个值是左上和右下，第二个值表示右上和左下 */
      border-radius: 10px 30px;
    }
    .radius7 {
      width: 100px;
      height: 100px;
      background-color: rgb(168, 166, 166);
      /* 三个值表示：第一个值是左上，第二个值表示右上和左下，第三个值表示右下 */
      border-radius: 10px 30px 50px;
    }
    .radius8 {
      width: 100px;
      height: 100px;
      background-color: rgb(168, 166, 166);
      /* 四个值表示：第一个值是左上，第二个值表示右上，第三个值表示右下，第四个值表示左下 */
      border-radius: 10px 30px 30px 10px;
    }
    .liu {
      border-radius: 30px 0 ;
      border: 5px solid skyblue;
    }
  </style>
</head>
<body>
  <div class="radius1"></div>
  <div class="radius2"></div>
  <div class="radius3">胶囊按钮</div>
  <div class="radius4"></div>
  <img src="./img/01.jpg" alt="" class="jia">
  <div class="radius5">一个值</div>
  <div class="radius6">两个值</div>
  <div class="radius7">三个值</div>
  <div class="radius8">四个值</div>
  <img src="./img/04.jpg" alt="" class="liu">

</body>
</html>
