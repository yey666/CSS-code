<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>css样式表分类</title>
  <style>
    div{
      color:skyblue;
    }
    strong{
      color:green;
    }
  </style>
</head>
<body>
  <!-- 1.内联样式表（行内样式表） 直接写到标签内部，控制当前标签的样式-->
   <p style="color:rgb(79, 79, 154)">颜色标签是:style=“color：颜色”</style></p>
  <!-- 2.内部样式表 写到head标签内部的style标签内部，控制当前页面的所有标签的样式-->
  <div>在</head>上面用style标签定义的样式，会控制当前页面的所有标签的样式</div>
  <strong>我是strong标签，会加粗显示</strong>
</body>
</html>
