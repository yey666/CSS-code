<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单伪类选择器</title>
  <style>
    button {
      width: 150px;
      height: 40px;
      background: #ff6900;
      /* 去掉边框 */
      border:none;
      color:#fff;
      font-size: 16px;
    }
    /* 表单禁用伪类选择器 */
    button:disabled {
      /* background: #ccc; */
      /* 透明度 */
      opacity: 0.5;
    }
    input {
      background-color: #ff6900;
    }
    /* 表单被选中伪类选择器 */
    input:checked+label {
      color: #ff6900;
    }
  </style>
</head>
<body>
  <button disabled>提交</button>
  <br>
  <input type="checkbox" id="argee">
  <label for="argee">同意协议</label>
</body>
</html>
