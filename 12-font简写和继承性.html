<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>font简写和继承性</title>
  <style>
    body {
      /* font:14px/1.5 "宋体"; */
      /* font: 14px "宋体"; */
      /* 有严格书写顺序 */
      font: italic 700 18px/1.5 "宋体";
    }
    /* css继承性 子元素继承父元素的样式属性，当子元素有自己的样式属性时，会覆盖父元素的样式属性 */
    div {
      color: red;
      font-size: 24px;
      text-align: center;
      height: 50px;
    }
    p {
      color: blue;
    }
  </style>
</head>
<body>
  <div>
    <p>
      我是一个段落
    </p>
  </div>
</body>
</html>
