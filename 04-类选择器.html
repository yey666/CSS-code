<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>类选择器</title>
  <style>
    /* 类选择器 选择一个或多个实现 */
    /* 类选择器的语法：.类名 */
    /* 类选择器的作用：将类名添加到元素上，实现对元素的样式控制 */
    .red{
      color:red;
    }
    .sub-nav{
      font-size: 4px;
    }
  </style>

</head>
<body>
  <div class="red">111</div>
  <div class="red">222</div>
  <div class="red sub-nav">333</div>
  <div>444</div>
</body>
</html>
