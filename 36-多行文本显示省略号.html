<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多行文本显示省略号</title>
  <style>
    .box {
      width: 200px;
      height: 45px;
      background-color: pink;
     /* 多行文本显示省略号 重要的是把盒子高度修改为 正好显示行数的高度 */
     /* 旧版弹性盒子布局 */
     display: -webkit-box;
     /* 文本垂直排列 */
     -webkit-box-orient: vertical;
     /* 限制显示行数 */
     -webkit-line-clamp: 2;
     /* 隐藏隐藏内容 */
     overflow: hidden;
     /* 文本溢出显示省略号 */
     text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="box">多行文本显示省略号，应该怎么显示，应该用什么？
    我们应该怎么写？怎么做</div>
</body>
</html>
