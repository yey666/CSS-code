<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外边距合并和塌陷</title>
  <style>
    [class^="box"]{
      width: 150px;
      height: 100px;
      background-color: pink;
    }
    /* 上下外边距会合并，谁大取谁的 兄弟级关系*/
    .box1 {
      margin-bottom: 100px;
    }
    .box2 {
      background-color: aquamarine;
      margin-top: 50px;
      /* margin-bottom: 50px; */
    }
    /* 给子元素添加外边距，父元素会跟着移动，称为塌陷 */
    /* 解决方法：1.给父盒子添加上边框；2.给父盒子添加上内边距；3.给父盒子添加overflow:hidden; */
    .father {
      width: 150px;
      height: 150px;
      background-color: aquamarine;
      /* 1.给父盒子添加上边框 */
      /* border: 1px solid #000 */
      /* 2.给父盒子添加上内边距 */
      /* padding-top: 20px; */
      /* 3.给父盒子添加overflow:hidden; */
      overflow: hidden;
    }
    .son {
      width: 80px;
      height: 80px;
      background-color: pink;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <div class="box1"></div>
  <div class="box2"></div>

  <div class="father">
    <div class="son"></div>
  </div>
</body>
</html>
