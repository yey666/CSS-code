<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表格合并相邻边框</title>
  <style>
    table {
      width: 300px;
      border-collapse: collapse;
    }
    table,
    td {
      border: 1px solid #4b4a4a;
    }
  </style>
</head>
<body>
  <table>
    
    <tr>
      <td>张三</td>
      <td>18</td>
      <td>男</td>
    </tr>
    <tr>
      <td>李四</td>
      <td>20</td>
      <td>女</td>
    </tr>
    <tr>
      <td>王五</td>
      <td>22</td>
      <td>男</td>
    </tr>
  </table>
</body>
</html>
