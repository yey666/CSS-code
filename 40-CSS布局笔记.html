<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS布局笔记</title>
</head>
<body>
  CSS正常布局流
  <p>包括区块元素block：独占一行，宽度默认撑满父容器；垂直方向排列，可设置宽高；示例：div、p、h1等</p>
  <p>包括行内元素inline：不独占一行，宽度默认自适应，水平方向排列，不可设置宽高；示例：span、a、img、strong等</p>
</body>
</html>
